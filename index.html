<!DOCTYPE html>

<html>

<head>

    <title>Einkaufi Helfer</title>
<!--CSS START-->
<style>

body {
    margin: 0;
    top: 2px;
    min-height: 100vh;
    background-image: url("images/Einkaufihelferbg.png");
    background-size: cover;
    background-position: absolute;
    background-repeat: no-repeat;
    font-family: Arial, sans-serif;
    padding: 20px;
    background-color: #d2f7f8;
}

.search-container {
    width: 300px;
    position: relative;
}

#searchBox {
    position: absolute;
    left: 170%;
    top: 250px;
    width: 250%;
    padding: 10px;
    box-sizing: border-box;
}

#dropdown {
    position: absolute;
    left: 190%;
    top: 295px;
    width: 200%;
    background: white;
    border: 1px solid #ccc;
    border-top: none;
    display: none;
    z-index: 9999;
}

.result {
    display: flex;
    align-items: center;
    width: 95%;
    gap: 10px;
    padding: 8px;
    cursor: pointer;
}

.result:hover {
    background: #f5f5f5;
}

.result img {
    width: 80px;
    height: 80px;
    object-fit: cover;
}

.product-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
}

.product-name {
    font-size: 22px;
}

.price {
    color: green;
    font-weight: bold;
    font-size: 22px;
}

.Einkaufswagen {
    position: absolute;
    top: 55%;
    right: 50%;
    align-items: center;
    font-size: large;
     background: rgb(255, 255, 255);
    border: none;
    padding: 3px 6px;
    border-radius: 4px;
}

button {
    margin-left: 10px;
    cursor: pointer;
    background: rgb(29, 128, 185);
    color: white;
    border: none;
    padding: 3px 6px;
    border-radius: 4px;
}
.emojis {

    height: 40px;
    width: 40px;

}

#spinner {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 300px;
    height: 150px;

    animation: spin 2s linear infinite;
}

@keyframes spin {
    from {
        transform: translateY(-50%) rotate(0deg);
    }
    to {
        transform: translateY(-50%) rotate(360deg);
    }
}
</style>
<!--CSS END-->
</head>

<!--BODY START-->
<body>

<img id="spinner" src="images/bitte.png" alt="spinner">

<div class="search-container">
    <input
        type="text"
        id="searchBox"
        placeholder="Such Produkte..."
    >

    <div id="dropdown"></div>
</div>

<div class="Einkaufswagen">
<h3>Einkaufswagen</h3>
<div id="cart"></div>

<h3>Gesamtbetrag: <span id="total">0.00 €</span></h3>
<div id="emojis">
<img id="rewardImage" src="images/sideeye.JPG" style="display:none; width:80px;">
<img id="rewardImage2" src="images/emojinobg.png" style="display:none; width:80px;">
<img id="rewardImage3" src="images/emoji2.png" style="display:none; width:80px;">
</div>

</div>

<!--script start-->
<script>

let cart = [];

const groceries = [
    {
        name: "Eistee - der Grüne",
        image: "images/eistee.JPG",
        price: 1.99
    },
    {
        name: "Milch",
        image: "images/milch.JPG",
        price: 1.79
    },
    {
        name: "Banane",
        image: "images/banane.JPG",
        price: 0.30
    },
    {
        name: "Brechbohnen",
        image: "images/bohnen.JPG",
        price: 1.99
    },
    {
        name: "Back-Camembert",
        image: "images/camembert.JPG",
        price: 3.29
    },
    {
        name: "Eier 6x",
        image: "images/eier.JPG",
        price: 4.19
    },
    {
        name: "Fleischwurst",
        image: "images/fleischwurst.JPG",
        price: 3.99
    },
    {
        name: "Käse - Gouda",
        image: "images/gouda.JPG",
        price: 2.39
    },
    {
        name: "Gurke",
        image: "images/gurke.JPG",
        price: 0.79
    },
    {
        name: "Hänchenbrust",
        image: "images/hanchen.JPG",
        price: 6.09
    },
    {
        name: "Kartoffeln",
        image: "images/kartoffel.JPG",
        price: 4.19
    },
    {
        name: "Katzen snack",
        image: "images/katzi.JPG",
        price: 5.19
    },
    {
        name: "Küchenrolle - tücher",
        image: "images/tucher.JPG",
        price: 2.75
    },
    {
        name: "Toilettenpapier",
        image: "images/toilette.JPG",
        price: 3.83
    },
    {
        name: "Mehl",
        image: "images/mehl.JPG",
        price: 1.59
    },
    {
        name: "Rinderhack",
        image: "images/hockfleisch.JPG",
        price: 7.49
    },
    {
        name: "Pizza Mozarella",
        image: "images/pizzam.JPG",
        price: 3.99
    },
    {
        name: "Pizza Salami",
        image: "images/pizzas.JPG",
        price: 3.99
    },
    {
        name: "Putenbrust",
        image: "images/putenbrust.JPG",
        price: 1.99
    },
    {
        name: "Schlagsahne",
        image: "images/schlagsahne.JPG",
        price: 0.89
    },
    {
        name: "Spargel",
        image: "images/spargel.JPG",
        price: 4.79
    },
    {
        name: "Weiner Würstchen",
        image: "images/weiner.JPG",
        price: 4.19
    },
    {
        name: "Zucker",
        image: "images/zucker.JPG",
        price: 1.19
    },
    {
        name: "Zwiebeln",
        image: "images/zwiebeln.JPG",
        price: 2.19
    },
];

const searchBox = document.getElementById("searchBox");
const dropdown = document.getElementById("dropdown");

searchBox.addEventListener("input", () => {

    const text = searchBox.value.toLowerCase();
    dropdown.innerHTML = "";

    if (text === "") {
        dropdown.style.display = "none";
        return;
    }

    const matches = groceries.filter(item =>
        item.name.toLowerCase().includes(text)
    );

    matches.forEach(item => {

        const result = document.createElement("div");
        result.classList.add("result");

        result.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <div class="product-info">
                <span class="product-name">${item.name}</span>
                <span class="price">${item.price.toFixed(2)} €</span>
            </div>
        `;

        result.addEventListener("click", () => {
            searchBox.value = item.name;
            dropdown.style.display = "none";

            cart.push(item);
            updateCart();

            searchBox.value = "";
        });

        dropdown.appendChild(result);
    });

    dropdown.style.display = matches.length ? "block" : "none";
});


function updateCart() {
    const cartDiv = document.getElementById("cart");
    const totalSpan = document.getElementById("total");

    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        const div = document.createElement("div");

        div.innerHTML = `
            ${item.name} - ${item.price.toFixed(2)} €
            <button onclick="removeItem(${index})">❌</button>
        `;

        cartDiv.appendChild(div);

        total += item.price;
    });

    totalSpan.textContent = total.toFixed(2) + " €";

    //EMOJI 1
    const rewardImage = document.getElementById("rewardImage");

if (total >= 25 && total <= 39.99) {
    rewardImage.style.display = "inline-block";
} else {
    rewardImage.style.display = "none";
}
    //EMOJI2
    const rewardImage2 = document.getElementById("rewardImage2");

if (total >= 40 && total <= 69.99) {
    rewardImage2.style.display = "inline-block";
} else {
    rewardImage2.style.display = "none";
}
    //EMOJI3
    const rewardImage3 = document.getElementById("rewardImage3");

if (total >= 70) {
    rewardImage3.style.display = "inline-block";
} else {
    rewardImage3.style.display = "none";
}
}

function removeItem(index) {
    cart.splice(index, 1); // remove 1 item at position index
    updateCart();          // refresh display + total
}
</script>
<!--script end-->
</body>
<!--BODY END-->

</html>
