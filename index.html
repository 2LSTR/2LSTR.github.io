<!--CSS START-->

   position: absolute;

/* split layout */

  display: flex;

    position: absolute;

<!--BODY START-->
<body>

<div class="container">

<h2>Original Text</h2>
<textarea id="original" style="width: 485px; height: 72px;"></textarea>

<h2>Geheimer Text</h2>
<textarea id="encrypted" readonly style="width: 485px; height: 42px;"></textarea>

<h2>Klartext</h2>
<textarea id="decrypted" readonly style="width: 485px; height: 42px;"></textarea>

<button type="button" id="runBtn" style="width: 122px; height: 122px;">Bestätigen</button>

<div class="container2">
  <div class="terminal" id="terminal"></div>
  <div class="content">
  </div>
</div>

<!--This is where the Javascript starts-->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const cipher =   "QWERTYUIOPASDFGHJKLZXCVBNM";

    function encrypt(text) {
        let result = "";

        for (let char of text.toUpperCase()) {
            const index = alphabet.indexOf(char);

            if (index !== -1) {
                result += cipher[index];
            } else {
                result += char;
            }
        }

        return result;
    }

    function decrypt(text) {
        let result = "";

        for (let char of text.toUpperCase()) {
            const index = cipher.indexOf(char);

            if (index !== -1) {
                result += alphabet[index];
            } else {
                result += char;
            }
        }

        return result;
    }

    const originalBox = document.getElementById("original");
    const encryptedBox = document.getElementById("encrypted");
    const decryptedBox = document.getElementById("decrypted");
    const button = document.getElementById("runBtn");

    if (!originalBox || !encryptedBox || !decryptedBox || !button) {
        console.error("One or more elements not found!");
        return;
    }

    button.addEventListener("click", () => {
        const originalText = originalBox.value;

        const encryptedText = encrypt(originalText);
        encryptedBox.value = encryptedText;

        const decryptedText = decrypt(originalText);
        decryptedBox.value = decryptedText;
    });

});

//FOR THE CYBERPUNK STUFF
const terminal = document.getElementById("terminal");

const lines = [
  "> boote verschluesselungs interface...",
  "> lade Substitution Cipher v9.4",
  "> sichere Verbindung wird hergestellt...",
  "> GTA 6 wird released...",
  "> Cipher ist bereit ✔",
  "",
  "Schreibe eine Nachricht."
];

let i = 0;
let j = 0;

function typeLine() {
  if (i < lines.length) {
    if (j < lines[i].length) {
      terminal.innerHTML += lines[i][j];
      j++;
      setTimeout(typeLine, 20);
    } else {
      terminal.innerHTML += "\n";
      i++;
      j = 0;
      setTimeout(typeLine, 400);
    }
  } else {
    terminal.innerHTML += "\n> _";
  }
}

typeLine();
//CYBERPUNKEND
</script>
<!--This is where the Javascript ends-->

</body>
<!--BODY END-->
</html>
